# Workflow buil NestJs Project

name: run integration test on nest

on:
  push:
    branches: ["development"]

  pull_request:
    branches: ["main", "development"]

jobs:
  test: 
    name: Test 
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      
      neo4j:
        image: neo4j:5
        ports:
          - 7474:7474
          - 7687:7687
        env:
          NEO4J_AUTH: neo4j/password
        options: >-
          --health-cmd="cypher-shell -u neo4j -p password 'RETURN 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
  
    steps:
      - name: ⬇️ Checkout repository
        uses:  actions/checkout@v3

      - name: 🟢 Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22
      
      - name: Run MinIO
        run: |
          docker run -d \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            --name minio \
            minio/minio server /data
      
      - name: 📦 Install dependencies
        run:  npm install
      
      - name: 🔧 Build backend
        run:  npm run build:backend 

      - name: ⏳ Wait for Neo4j
        run: |
          for i in {1..10}; do
            echo "Checking neo4j:7687..."
            nc -z localhost 7687 && echo "Neo4j ready" && exit 0
            sleep 5
          done
          echo "Neo4j not ready in time"
          exit 1

      - name: ⏳ Wait for MinIO
        run: |
          for i in {1..10}; do
            echo "Checking minio:9000..."
            nc -z localhost 9000 && echo "MinIO ready" && exit 0
            sleep 3
          done
          echo "MinIO not ready in time"
          exit 1
  
      - name: ✅ Run integration test
        run: npm run test:backend
