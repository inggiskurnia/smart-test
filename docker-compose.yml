version: "3.8"

services:
  feedback-proxy:
    image: nginx:alpine
    volumes:
      - /home/ubuntu/cert/:/etc/nginx/cert/:ro
      - ./docker/edge.proxy.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${APP_PORT}:443"
    depends_on:
      - feedback-web
      - feedback-backend
      - feedback-redis
    networks:
      - shared_services

  feedback-redis:
    image: redis:7-alpine
    expose:
      - "6379"
    networks:
      - shared_services

  feedback-web:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    expose:
      - "80"
    networks:
      - shared_services

  feedback-backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    expose:
      - "8091"
    environment:
      - PORT=8091
      - NODE_ENV=production
      - NEO4J_HOST=${NEO4J_HOST}
      - NEO4J_USER=${NEO4J_USER}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - NEO4J_DATABASE=${NEO4J_DATABASE}
      - NEO4J_DISABLE_LOSSLESS_INTEGERS=true
      - NEO4J_USEBIGINT=false
      - REDIS_HOST=feedback-redis
      - REDIS_PORT=6379
    depends_on:
      - feedback-redis
    networks:
      - shared_services

networks:
  shared_services:
    external: true
