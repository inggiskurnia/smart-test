version: "3.8"

services:
  risk-proxy:
    image: nginx:alpine
    volumes:
      - /home/ubuntu/cert/:/etc/nginx/cert/:ro
      - ./docker/edge.proxy.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${APP_PORT}:443"
    depends_on:
      - risk-web
      - risk-backend
    networks:
      - shared_services
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  risk-web:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    expose:
      - "80"
    networks:
      - shared_services
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  risk-backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    expose:
      - "8091"
    environment:
      - PORT=8091
      - NODE_ENV=production
      - NEO4J_HOST=${NEO4J_HOST}
      - NEO4J_USER=${NEO4J_USER}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - NEO4J_DATABASE=${NEO4J_DATABASE}
      - NEO4J_DISABLE_LOSSLESS_INTEGERS=true
      - NEO4J_USEBIGINT=false
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
    networks:
      - shared_services
    volumes:
      - app_logs:/app/storage/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  risk-promtail:
    image: grafana/promtail:2.9.2
    container_name: risk_promtail
    volumes:
      - ./docker/promtail.yaml:/etc/promtail/config.yml
      - app_logs:/app/storage/logs
      - promtail_positions:/var/lib/promtail
    command: -config.file=/etc/promtail/config.yml
    networks:
      - shared_services
    depends_on:
      - risk-backend

volumes:
  app_logs:
  promtail_positions:

networks:
  shared_services:
    external: true
