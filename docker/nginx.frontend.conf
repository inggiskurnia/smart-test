# docker/nginx.frontend.conf
server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # SPA: when file/dir isn't found, fall back to index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Optional: cache static assets
  location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpe?g|gif)$ {
    expires 30d;
    access_log off;
  }
}
