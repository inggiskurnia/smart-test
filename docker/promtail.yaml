server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /var/lib/promtail/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: ops_stack_risk
    static_configs:
      - targets:
          - localhost
        labels:
          job: risk_register
          host: ops_production_server

          __path__: /app/storage/logs/*.log

    pipeline_stages:
      - json:
          expressions:
            level: level
            context: context
            requestId: requestId
            message: message

      - labels:
          level:
          requestId:
          context:
